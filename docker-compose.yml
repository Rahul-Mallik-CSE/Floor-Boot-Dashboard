services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: floorboot-dashboard
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://69.62.70.69:8089/api/v1
      - NEXT_PUBLIC_API_MEDIA_URL=http://69.62.70.69:8089
    restart: unless-stopped
    networks:
      - floorboot-network

networks:
  floorboot-network:
    driver: bridge
